name: Test Dotfiles

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-macos:
    name: Test on macOS
    runs-on: macos-latest

    steps:
      - name: Check Homebrew installation
        run: |
          if command -v brew &> /dev/null; then
            echo "✓ Homebrew is installed"
            brew --version
          else
            echo "✗ Homebrew is not installed"
            exit 1
          fi

      - name: Install chezmoi
        run: |
          brew install chezmoi
          chezmoi --version

      - name: Initialize chezmoi with dotfiles
        env:
          CHEZMOI_NO_SECRETS: "1"
        run: |
          chezmoi init --no-tty --promptDefaults https://github.com/soya-miyoshi/dotfiles.git
          echo "✓ chezmoi init succeeded"

      - name: Check chezmoi source directory
        run: |
          cd "$(chezmoi source-path)"
          echo "✓ chezmoi cd succeeded"
          echo "Current directory: $(pwd)"
          ls -la

      - name: Apply dotfiles (dry-run)
        env:
          CHEZMOI_NO_SECRETS: "1"
        run: |
          chezmoi apply --no-tty --dry-run --verbose
          echo "✓ chezmoi apply --dry-run succeeded"

      - name: Apply dotfiles
        env:
          CHEZMOI_NO_SECRETS: "1"
        run: |
          chezmoi apply --no-tty --verbose
          echo "✓ chezmoi apply succeeded"

      - name: Verify installation
        run: |
          echo "Checking installed files..."
          ls -la ~/ | head -20

          if [ -f ~/.zshrc ]; then
            echo "✓ .zshrc installed"
          else
            echo "⚠ .zshrc not found"
          fi

  test-linux-docker:
    name: Test on Linux (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test Docker image
        run: |
          docker build -f Dockerfile.test -t dotfiles-test .

      - name: Run dotfiles tests in Docker
        run: |
          docker run --rm dotfiles-test

  test-ubuntu-native:
    name: Test on Ubuntu (Native)
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git build-essential

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Verify Homebrew installation
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew --version
          echo "✓ Homebrew is installed"

      - name: Install chezmoi
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify chezmoi installation
        run: |
          chezmoi --version
          echo "✓ chezmoi is installed"

      - name: Initialize chezmoi with dotfiles
        env:
          CHEZMOI_NO_SECRETS: "1"
        run: |
          chezmoi init --no-tty --promptDefaults https://github.com/soya-miyoshi/dotfiles.git
          echo "✓ chezmoi init succeeded"

      - name: Check chezmoi source directory
        run: |
          cd "$(chezmoi source-path)"
          echo "✓ chezmoi cd succeeded"
          echo "Current directory: $(pwd)"
          ls -la

      - name: Apply dotfiles (dry-run)
        env:
          CHEZMOI_NO_SECRETS: "1"
        run: |
          chezmoi apply --no-tty --dry-run --verbose
          echo "✓ chezmoi apply --dry-run succeeded"

      - name: Apply dotfiles
        env:
          CHEZMOI_NO_SECRETS: "1"
        run: |
          chezmoi apply --no-tty --verbose
          echo "✓ chezmoi apply succeeded"

      - name: Verify installation
        run: |
          echo "Checking installed files..."
          ls -la ~/ | head -20

          if [ -f ~/.zshrc ]; then
            echo "✓ .zshrc installed"
          else
            echo "⚠ .zshrc not found"
          fi
