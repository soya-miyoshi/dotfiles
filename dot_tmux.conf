# ============================================================
# tmux configuration
# ============================================================

# ---- Basics ----
set-option -g status-left-length 50
set-option -g mouse on
set-option -g history-limit 50000
set-option -g focus-events on
set-option -sg escape-time 10
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc,*256col*:Tc"

# 1-indexed windows/panes — easier mental model
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on

# Reload config with `prefix r`
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ---- Pane navigation: vim-tmux-navigator integration ----
# Ctrl+h/j/k/l moves between tmux panes AND nvim splits seamlessly.
# Requires `christoomey/vim-tmux-navigator` on the nvim side.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\\.?(view|n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-pane -l'

# Same bindings inside copy-mode so they keep working
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
bind -T copy-mode-vi 'C-\' select-pane -l

# Legacy: keep `prefix h/j/k/l` as a fallback for muscle memory
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---- Pane splits with intuitive keys ----
# `prefix |` and `prefix -` split horizontally and vertically respectively,
# inheriting the current working directory.
bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Open new windows in the same directory too
bind c new-window -c "#{pane_current_path}"

unbind C-O

# ---- Copy-mode: vi-style ----
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
# macOS: copy to system clipboard via pbcopy
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"

# ---- Status bar (minimal) ----
set-option -g status-position bottom
set-option -g status-style "fg=white,bg=default"
set-option -g status-left "#[fg=green][#S] "
set-option -g status-right "#[fg=cyan]%Y-%m-%d %H:%M "
