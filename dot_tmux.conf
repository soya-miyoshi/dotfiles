# ============================================================
# tmux configuration
# ============================================================

# ---- Prefix ----
# Use Ctrl+a instead of the default Ctrl+b (easier to reach, screen-compatible).
# Press Ctrl+a twice to send a literal Ctrl+a to the shell (readline line-start).
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# ---- Basics ----
set-option -g status-left-length 50
set-option -g mouse off
set-option -g history-limit 50000
set-option -g focus-events on
set-option -sg escape-time 10
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc,*256col*:Tc"

# 1-indexed windows/panes — easier mental model
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on

# Reload config with `prefix r`
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ---- Pane navigation: vim-tmux-navigator integration ----
# Ctrl+h/j/k/l moves between tmux panes AND nvim splits seamlessly.
# Requires `christoomey/vim-tmux-navigator` on the nvim side.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\\.?(view|n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-pane -l'

# Same bindings inside copy-mode so they keep working
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
bind -T copy-mode-vi 'C-\' select-pane -l

# Legacy: keep `prefix h/j/k/l` as a fallback for muscle memory
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---- Pane resize ----
# Hold prefix once, then tap arrow keys repeatedly (within repeat-time) to
# resize the active pane in 5-cell steps. `-r` enables the repeat behavior.
# Arrow keys are reused for resize because pane switching already uses
# Ctrl+h/j/k/l (vim-tmux-navigator) and doesn't need arrows.
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 5
bind -r Up    resize-pane -U 5
bind -r Right resize-pane -R 5

# Keep H/J/K/L as a secondary resize binding for vim muscle memory.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Hold Ctrl while tapping prefix + h/j/k/l for resize. Lets you press
# Ctrl+a then keep Ctrl held and rapid-fire Ctrl+h/j/k/l without Shift.
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# ---- Pane splits with intuitive keys ----
# `prefix |` and `prefix -` split horizontally and vertically respectively,
# inheriting the current working directory.
bind '|' split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Open new windows in the same directory too
bind c new-window -c "#{pane_current_path}"

unbind C-O

# ---- Copy-mode quick entry (toggle) ----
# F1 toggles "scroll mode": zooms the current pane to full window and enters
# copy-mode scrolled up one screen. Pressing F1 again (or q) cancels copy-mode
# and unzooms back to the split. Single-key, no modifiers, no terminal conflict.
bind -n F1 resize-pane -Z \; copy-mode -u
bind -T copy-mode-vi F1 send-keys -X cancel \; resize-pane -Z

# F2: copy-mode without zoom (for quick copy in split view)
bind -n F2 copy-mode -u
bind -T copy-mode-vi F2 send-keys -X cancel

# ---- Copy-mode: vi-style ----
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
# macOS: copy to system clipboard via pbcopy
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"

# Y (capital) copies the whole current line to the system clipboard without
# needing to enter selection mode first — mirrors vim's `yy`.
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi Y { send-keys -X select-line ; send-keys -X copy-pipe-and-cancel pbcopy }" \
    "bind -T copy-mode-vi Y { send-keys -X select-line ; send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in' }"

# ---- Terminal title ----
# Show the tmux session name (= ghq repo name via the Ctrl+G session helper)
# as the iTerm/terminal tab title, instead of the generic "tmux".
set-option -g set-titles on
set-option -g set-titles-string "#S / #W"

# ---- Status bar (minimal) ----
set-option -g status-position bottom
set-option -g status-style "fg=white,bg=default"
set-option -g status-left "#[fg=green][#S] "
set-option -g status-right "#[fg=cyan]%Y-%m-%d %H:%M "
